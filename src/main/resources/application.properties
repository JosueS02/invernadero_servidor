spring.application.name=invernadero

# ===============================
# CONFIGURACIÓN DE BASE DE DATOS (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/invernadero_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.mqtt.url=tcp://localhost:1883
spring.mqtt.client.id=servidor-invernadero
spring.mqtt.default.topic=invernadero/+/sensor/#